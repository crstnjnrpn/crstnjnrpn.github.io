<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="admin.css">
    <title>Jangsu Korean Store - Add Product</title>
</head>
<body>
    <div class="admin-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Admin Dashboard</h2>
            </div>
            
            <nav class="sidebar-nav">
                <!-- General Section -->
                <div class="nav-section">
                    <div class="nav-section-title">General</div>
                    <!-- Dashboard link -->
                    <a href="admin-dashboard.html" class="nav-item">Dashboard</a>
                    <!-- Orders link -->
                    <a href="admin-order.html" class="nav-item">Orders</a>
                    <!-- Products link -->
                    <a href="admin-product.html" class="nav-item"> Products</a>
                    <!-- Inventory link -->
                    <a href="admin-inventory.html" class="nav-item">Inventory</a>
                    <!-- Reports link -->
                    <a href="admin-report.html" class="nav-item">Reports</a>
                </div>
                <!-- Settings Section -->
                <div class="nav-section">
                    <a href="admin-setting.html" class="nav-item activ">
                        <span class="nav-icon">⚙️</span> Settings
                    </a>
                </div>
            </nav>
        </aside>

        <!-- ===== MAIN CONTENT AREA ===== -->
        <main class="main-content">
            <!-- Page Header with Welcome Message -->
            <div class="page-header">
                <h1 class="page-title">Add Product</h1>
                <div class="welcome-message">
                    <span class="welcome-text">Welcome,</span>
                    <span class="admin-name">Admin</span>
                </div>
            </div>
            
            <h2 class="section-title">General</h2>
            <h3 class="subsection-title">Add Product</h3>
            
            <!-- Add Product Form Container -->
            <div class="add-product-container">
                <div class="form-section">
                    <h4 class="form-section-title">Product Information</h4>
                    
                    <form id="add-product-form" class="product-form">
                        <!-- Product Name Field -->
                        <div class="form-group">
                            <label for="product-name" class="form-label">Product Name:</label>
                            <input type="text" id="product-name" name="product-name" class="form-input" placeholder="e.g., Kimchi Ramen" required>
                        </div>
                        
                        <!-- Price Field -->
                        <div class="form-group">
                            <label for="product-price" class="form-label">Price:</label>
                            <input type="number" id="product-price" name="product-price" class="form-input" placeholder="₱ 0.00" min="0" step="0.01" required>
                        </div>
                        
                        <!-- Stock Quantity Field -->
                        <div class="form-group">
                            <label for="stock-quantity" class="form-label">Stock Quantity:</label>
                            <input type="number" id="stock-quantity" name="stock-quantity" class="form-input" placeholder="Available units" min="0" required>
                        </div>
                        
                        <!-- Low Stock Threshold Field -->
                        <div class="form-group">
                            <label for="low-stock-threshold" class="form-label">Low Stock Threshold:</label>
                            <input type="number" id="low-stock-threshold" name="low-stock-threshold" class="form-input" placeholder="Alert when stock below" min="0" value="5" required>
                        </div>
                        
                        <!-- Category Field -->
                        <div class="form-group">
                            <label for="product-category" class="form-label">Category:</label>
                            <select id="product-category" name="product-category" class="form-input" required>
                                <option value="">Select category</option>
                                <option value="Ramen">Ramen</option>
                                <option value="Snacks">Snacks</option>
                                <option value="Drinks">Drinks</option>
                                <option value="Sauces">Sauces</option>
                                <option value="Frozen">Frozen</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                        
                        <!-- Upload Image Section -->
                        <div class="upload-section">
                            <label class="form-label">Upload Image:</label>
                            <div class="upload-area" id="upload-area">
                                <input type="file" id="product-image" name="product-image" accept="image/*" class="file-input">
                                <div class="upload-placeholder">
                                    <span class="upload-icon">🖼️</span>
                                    <span class="upload-text">Click to upload image</span>
                                    <span class="upload-text" style="font-size: 12px;">PNG, JPG up to 2MB</span>
                                </div>
                            </div>
                            <div class="image-preview" id="image-preview" style="display: none;">
                                <img id="preview-img" src="#" alt="Preview">
                                <button type="button" class="remove-image" id="remove-image">✕</button>
                            </div>
                        </div>
                        
                        <!-- Form Actions -->
                        <div class="form-actions">
                            <button type="submit" class="save-btn">💾 Save Product</button>
                            <a href="admin-product.html" class="cancel-btn">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
            
            <!-- Back to List Link -->
            <div class="back-to-list">
                <a href="admin-product.html" class="back-link">
                    <span class="back-icon">←</span> Back to Product List
                </a>
            </div>
            
        </main>
    </div>

    <script src="admin-system.js"></script>
</body>
</html>
