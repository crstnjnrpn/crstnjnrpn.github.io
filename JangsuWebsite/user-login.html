<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="user.css">
    <link rel="stylesheet" href="cart-sidebar.css">
    <title>Jangsu Korean Store - Login</title>
</head>
<body>

    <!-- Navigation Bar -->
    <header>
        <div class="logo">
            <img src="images/logo.png" alt="KStore Logo">
        </div>

        <nav>
            <a href="index.html">Home</a>
            <a href="products.html">Products</a>
            <a href="about-us.html">About Us</a>
        </nav>

        <div class="header-actions">
            <!-- Cart Icon with Badge -->
            <div class="cart-icon" id="cart-icon">
                🛒
                <span class="cart-badge" id="cart-badge">0</span>
            </div>
        </div>
    </header>

    <!-- Login Page Content -->
    <main class="login-page">
        <div class="login-container">
            
            <!-- Page Title -->
            <h1 class="login-title">Login</h1>
            
            <!-- Login Form -->
            <div class="login-form-container">
                
                <h2 class="login-form-title">Login</h2>
                
                <form id="login-form" class="login-form">
                    
                    <!-- Username Field -->
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" name="username" placeholder="Enter your username" required>
                    </div>
                    
                    <!-- Password Field -->
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="Enter your password" required>
                    </div>
                    
                    <!-- Sign In Button -->
                    <button type="submit" class="login-btn">Sign In</button>
                    
                    <!-- Sign Up Link -->
                    <div class="signup-link">
                        Don't Have An Account? <a href="user-signup.html">Sign Up</a>
                    </div>
                    
                </form>
                
            </div>
            
        </div>
    </main>

    <!-- Cart Sidebar Component -->
    <div class="cart-overlay" id="cart-overlay"></div>
    <div class="cart-sidebar" id="cart-sidebar">
        <div class="cart-header">
            <h2>Your Shopping Cart (<span id="cart-count">0</span>)</h2>
            <button class="close-cart-btn" id="close-cart">×</button>
        </div>
        
        <div class="cart-items-container" id="cart-items-container">
            <div class="empty-cart" id="empty-cart">
                <div class="empty-cart-icon">🛒</div>
                <p>Your cart is empty</p>
                <p class="empty-cart-hint">Browse our products and add items to your cart</p>
            </div>
            <div class="cart-items-list" id="cart-items-list"></div>
        </div>
        
        <div class="cart-footer" id="cart-footer">
            <div class="cart-total">
                <span>Total:</span>
                <span class="total-amount" id="cart-total">₱0.00</span>
            </div>
            <button class="view-order-btn" id="view-order-btn">View Order</button>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <a href="#">Contact Us</a>
        <span class="separator">|</span>
        <a href="#">Privacy Policy</a>
        <span class="copyright">© 2026 Jangsu Korean Store</span>
    </footer>

    <script src="cart-system.js"></script>
    <script src="user-system.js"></script>
</body>
</html>
