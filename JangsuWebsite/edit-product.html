<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="admin.css">
    <title>Jangsu Korean Store - Edit Product</title>
</head>
<body>
    <div class="admin-container">
        <!-- ===== SIDEBAR ===== -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Admin Dashboard</h2>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-section">
                    <div class="nav-section-title">General</div>
                    <a href="admin-dashboard.html" class="nav-item">
                        <span class="nav-icon">📊</span> Dashboard
                    </a>
                    <a href="admin-order.html" class="nav-item">
                        <span class="nav-icon">📦</span> Orders
                    </a>
                    <a href="admin-product.html" class="nav-item">
                        <span class="nav-icon">🛍️</span> Products
                    </a>
                    <a href="admin-inventory.html" class="nav-item">
                        <span class="nav-icon">📋</span> Inventory
                    </a>
                    <a href="admin-report.html" class="nav-item">
                        <span class="nav-icon">📊</span> Reports
                    </a>
                </div>
                <div class="nav-section">
                    <a href="admin-setting.html" class="nav-item">
                        <span class="nav-icon">⚙️</span> Settings
                    </a>
                </div>
            </nav>
        </aside>

        <!-- ===== MAIN CONTENT AREA ===== -->
        <main class="main-content">
            <!-- Page Header with Welcome Message -->
            <div class="page-header">
                <h1 class="page-title">Edit Product</h1>
                <div class="welcome-message">
                    <span class="welcome-text">Welcome,</span>
                    <span class="admin-name">Admin</span>
                </div>
            </div>
            
            <h2 class="section-title">General</h2>
            <h3 class="subsection-title">Edit Product</h3>
            
            <!-- Edit Product Form Container -->
            <div class="edit-product-container">
                <div class="form-section">
                    <h4 class="form-section-title">Product Information</h4>
                    
                    <form id="edit-product-form" class="product-form">
                        <!-- Hidden field for product ID -->
                        <input type="hidden" id="product-id">
                        
                        <!-- Product Name -->
                        <div class="form-group form-group-full">
                            <label for="product-name" class="form-label required">Product Name:</label>
                            <input type="text" id="product-name" name="product-name" class="form-input" placeholder="Enter product name" required>
                        </div>
                        
                        <!-- Two column layout for Price and Stock -->
                        <div class="form-row">
                            <div class="form-group">
                                <label for="product-price" class="form-label required">Price:</label>
                                <input type="number" id="product-price" name="product-price" class="form-input" placeholder="₱ 0.00" min="0" step="0.01" required>
                            </div>
                            
                            <div class="form-group">
                                <label for="stock-quantity" class="form-label required">Stock Quantity:</label>
                                <input type="number" id="stock-quantity" name="stock-quantity" class="form-input" placeholder="Available units" min="0" required>
                            </div>
                        </div>
                        
                        <!-- Two column layout for Reserved Stock and Threshold -->
                        <div class="form-row">
                            <div class="form-group">
                                <label for="reserved-stock" class="form-label">Reserved Stock:</label>
                                <input type="number" id="reserved-stock" name="reserved-stock" class="form-input" placeholder="Reserved units" min="0" value="0">
                            </div>
                            
                            <div class="form-group">
                                <label for="low-stock-threshold" class="form-label required">Low Stock Threshold:</label>
                                <input type="number" id="low-stock-threshold" name="low-stock-threshold" class="form-input" placeholder="Alert when stock below" min="0" required>
                            </div>
                        </div>
                        
                        <!-- Category -->
                        <div class="form-group form-group-full">
                            <label for="product-category" class="form-label required">Category:</label>
                            <select id="product-category" name="product-category" class="form-input" required>
                                <option value="">Select category</option>
                                <option value="Ramen">Ramen</option>
                                <option value="Snacks">Snacks</option>
                                <option value="Drinks">Drinks</option>
                                <option value="Sauces">Sauces</option>
                                <option value="Frozen">Frozen</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                        
                        <!-- Status Selection (Radio buttons) -->
                        <div class="form-group form-group-full">
                            <label class="form-label required">Status:</label>
                            <div class="status-toggle-group">
                                <label class="status-option active-status">
                                    <input type="radio" name="status" value="Active"> 
                                    <span>✅ Active</span>
                                </label>
                                <label class="status-option inactive-status">
                                    <input type="radio" name="status" value="Inactive"> 
                                    <span>❌ Inactive</span>
                                </label>
                            </div>
                        </div>
                        
                        <!-- Upload Image Section -->
                        <div class="upload-section">
                            <label class="form-label">Upload Image:</label>
                            
                            <!-- Current Image Display -->
                            <div id="current-image-container" class="current-image">
                                <span class="current-image-label">Current Image:</span>
                                <div id="current-image-preview" class="current-image-preview">
                                    <div class="no-image">No image uploaded</div>
                                </div>
                            </div>
                            
                            <!-- Upload New Image -->
                            <div class="upload-area" id="upload-area">
                                <input type="file" id="product-image" name="product-image" accept="image/*" class="file-input">
                                <div class="upload-placeholder">
                                    <span class="upload-icon">🖼️</span>
                                    <span class="upload-text">Click to upload new image</span>
                                    <span class="upload-text" style="font-size: 12px;">PNG, JPG up to 2MB</span>
                                </div>
                            </div>
                            
                            <!-- New Image Preview -->
                            <div class="image-preview" id="image-preview" style="display: none;">
                                <img id="preview-img" src="#" alt="Preview">
                                <button type="button" class="remove-image" id="remove-image">✕</button>
                            </div>
                        </div>
                        
                        <!-- Form Actions -->
                        <div class="form-actions">
                            <button type="submit" class="save-btn">💾 Save Changes</button>
                            <a href="admin-product.html" class="cancel-btn">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
            
            <!-- Back to List Link -->
            <div class="back-to-list">
                <a href="admin-product.html" class="back-link">
                    <span class="back-icon">←</span> Back to Product List
                </a>
            </div>
            
            <!-- Settings link at bottom -->
            <div class="bottom-settings">
                <a href="admin-setting.html" class="settings-link">
                    <span class="settings-icon">⚙️</span> Settings
                </a>
            </div>
        </main>
    </div>

    <script src="admin-system.js"></script>
</body>
</html>
